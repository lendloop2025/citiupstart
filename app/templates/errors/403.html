{% extends 'base.html' %}
{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">403</div>
  <h1 class="error-title">Access Denied</h1>
  <p class="error-text">
    You don't have permission to view this page.
    If you believe this is a mistake, make sure you're logged in with the correct account role.
  </p>
  <div style="display: flex; gap: 12px; justify-content: center;">
    <a href="{{ url_for('core.landing') }}" class="btn btn-primary">Go to Home</a>
    <a href="{{ url_for('auth.logout') }}" class="btn btn-outline">Log Out</a>
  </div>
</div>
{% endblock %}

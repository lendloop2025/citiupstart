{% extends 'base.html' %}
{% block title %}Server Error{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">500</div>
  <h1 class="error-title">Something Went Wrong</h1>
  <p class="error-text">
    An unexpected error occurred on our end. We've been notified.
    Please try again in a moment or return to the home page.
  </p>
  <a href="{{ url_for('core.landing') }}" class="btn btn-primary">Back to Home</a>
</div>
{% endblock %}

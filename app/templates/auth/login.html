{% extends 'base.html' %}
{% block title %}Log In{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <div style="text-align: center; margin-bottom: 32px;">
      <div class="nav-brand" style="justify-content: center; font-size: 2rem; margin-bottom: 16px;">
        <span class="brand-primary">121</span><span class="brand-accent">.ai</span>
      </div>
      <h1 class="form-title">Welcome back</h1>
      <p class="form-subtitle">Log in to your LendLoop account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <div class="form-group">
        <label for="email" class="form-label">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="Your password"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top: 8px;">
        Log In
      </button>
    </form>

    <div class="form-divider">or</div>

    <p style="text-align: center; font-size: 0.9rem; color: var(--text-muted);">
      Don't have an account?
      <a href="{{ url_for('auth.signup') }}" style="color: var(--accent); font-weight: 600;">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
